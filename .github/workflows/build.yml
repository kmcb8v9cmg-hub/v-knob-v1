name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build application
        run: ./scripts/build-app.sh
      - name: Package application
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Volume Knob.app" "dist/Volume-Knob.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: Volume-Knob-macOS
          path: dist/Volume-Knob.zip

